name: Advanced DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  security_and_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit pytest semgrep

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit -f json > dependency-audit.json

      - name: Static code analysis (Bandit)
        run: |
          bandit -r app/ --severity-level high

      - name: Semgrep SAST Scan
        run: |
          semgrep --config .semgrep.yml app/ \
          --json > semgrep-results.json

      - name: Run unit tests (pytest)
        run: pytest -v

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            dependency-audit.json
            semgrep-results.json

  docker_build_and_scan:
    needs: security_and_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
          -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Container vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: json
          output: trivy-results.json
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: cyclonedx-json
          output-file: sbom.json

      - name: Create Trusted Build Metadata
        run: |
          echo "trusted_build=true" > trusted-build.txt
          echo "image=${IMAGE_NAME}:${IMAGE_TAG}" >> trusted-build.txt
          echo "commit_sha=${GITHUB_SHA}" >> trusted-build.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build-artifacts
          path: |
            trivy-results.json
            sbom.json
            trusted-build.txt

  deploy:
    needs: docker_build_and_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy (simulation)
        run: |
          echo "Deployment successful 🚀"
          echo "Trusted secure artifact deployed"
