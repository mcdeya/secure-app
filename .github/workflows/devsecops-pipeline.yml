name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run dependency scan
        run: pip-audit -r requirements.txt


  unit-tests:
    needs: dependency-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # FIX: ensures "app/" can be imported in GitHub Actions
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      # FIX: uses your folder name "test/"
      - name: Run unit tests
        run: pytest test/ -v


  docker-build:
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:${{ github.sha }} .


  container-scan:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t secure-app:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-app:latest
          format: table
          exit-code: 0
          severity: CRITICAL


  deploy:
    needs: container-scan
    runs-on: ubuntu-latest

    steps:
      - run: echo "Deployment successful to production 🚀"
