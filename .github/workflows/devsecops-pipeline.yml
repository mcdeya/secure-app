name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  security_and_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit


      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit

      - name: Static code analysis (Bandit)
        run: bandit -r app/


      - name: Run unit tests (pytest)
        run: pytest -v

  docker_build_and_scan:
    needs: security_and_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:latest .

      - name: Container vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: secure-app:latest
          format: table
          exit-code: 0

  deploy:
    needs: docker_build_and_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy (simulation)
        run: echo "Deployment successful 🚀 Secure App is live"
