name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

# -----------------------------
# 1. DEPENDENCY SCAN
# -----------------------------
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run dependency scan (JSON output)
        run: pip-audit -r requirements.txt -f json -o pip-audit.json

      - name: Upload dependency scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: pip-audit.json


# -----------------------------
# 2. UNIT TESTS
# -----------------------------
  unit-tests:
    needs: dependency-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Run unit tests
        run: pytest test/ -v


# -----------------------------
# 3. DOCKER BUILD + SBOM
# -----------------------------
  docker-build:
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:${{ github.sha }} .

      # -----------------------------
      # FIXED SBOM GENERATION (NO BROKEN ACTION)
      # -----------------------------
      - name: Install Syft (official CLI)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin v1.4.1

      - name: Generate SBOM (CycloneDX)
        run: |
          syft docker:secure-app:${{ github.sha }} \
            -o cyclonedx-json=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json


# -----------------------------
# 4. CONTAINER SECURITY SCAN
# -----------------------------
  container-scan:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Run Trivy scan (STRICT)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-app:${{ github.sha }}
          format: json
          output: trivy-report.json
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Upload container scan results
        uses: actions/upload-artifact@v4
        with:
          name: container-scan
          path: trivy-report.json


# -----------------------------
# 5. TRUSTED DEPLOYMENT
# -----------------------------
  deploy:
    needs: container-scan
    runs-on: ubuntu-latest

    steps:
      - name: Define trusted build
        run: |
          echo "TRUSTED_BUILD=true" > trust.txt
          echo "IMAGE=secure-app:${{ github.sha }}" >> trust.txt

      - name: Upload trust artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build
          path: trust.txt

      - name: Deploy application
        run: echo "Deployment successful 🚀 (trusted build only)"
