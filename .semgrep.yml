name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  security-events: write

jobs:

# =========================================================
# 1. SAST (Semgrep)
# =========================================================
  lint-and-sast:
    name: "SAST · Semgrep"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
          generateSarif: "1"
          sarif: semgrep.sarif

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Generate Semgrep JSON summary
        run: |
          python - <<'EOF'
          import json, pathlib, datetime

          sarif = json.loads(pathlib.Path("semgrep.sarif").read_text())
          results = sarif.get("runs", [{}])[0].get("results", [])

          summary = {
              "tool": "semgrep",
              "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
              "total_findings": len(results),
              "errors": len([r for r in results if r.get("level") == "error"]),
              "passed": True
          }

          pathlib.Path("semgrep-report.json").write_text(json.dumps(summary, indent=2))
          EOF

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json


# =========================================================
# 2. DEPENDENCY SCAN
# =========================================================
  dependency-scan:
    name: "Dependency Scan · pip-audit"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            -f json \
            -o pip-audit-report.json

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json


# =========================================================
# 3. SECRET SCAN
# =========================================================
  secret-scan:
    name: "Secret Scan · Gitleaks"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --source .
            --report-format json
            --report-path gitleaks-report.json
            --exit-code 1
            --redact

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json


# =========================================================
# 4. TESTS
# =========================================================
  test:
    name: "Unit Tests · pytest"
    runs-on: ubuntu-24.04
    needs: [lint-and-sast, dependency-scan, secret-scan]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# =========================================================
# 5. BUILD IMAGE
# =========================================================
  build:
    name: "Build · Docker"
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Save image tarball
        run: docker save secure-app:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: image.tar


# =========================================================
# 6. SECURITY GATE (TRIVY + SBOM)
# =========================================================
  security-gate:
    name: "Security Gate · Trivy + SBOM"
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Run Trivy scan (BLOCK CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: secure-app:${{ github.sha }}
          format: sarif
          output: trivy-report.sarif
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin v1.4.1

      - name: Generate SBOM
        run: |
          syft docker:secure-app:${{ github.sha }} \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json


# =========================================================
# 7. PROMOTION (TRUSTED BUILD)
# =========================================================
  promote:
    name: "Promote · Trusted Build Manifest"
    runs-on: ubuntu-24.04
    needs: security-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate trusted build manifest
        env:
          IMAGE_NAME: secure-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import json, hashlib, pathlib, datetime, os

          def sha(path):
              return hashlib.sha256(pathlib.Path(path).read_bytes()).hexdigest()

          manifest = {
              "image": f"{os.environ['IMAGE_NAME']}:{os.environ['IMAGE_TAG']}",
              "commit": os.environ["IMAGE_TAG"],
              "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
              "gates": {
                  "sast": True,
                  "dependency_scan": True,
                  "secret_scan": True,
                  "unit_tests": True,
                  "container_scan": True,
                  "sbom": True
              },
              "artifacts": {
                  "sbom": sha("artifacts/sbom.cyclonedx.json"),
                  "trivy": sha("artifacts/trivy-report.sarif"),
                  "pip_audit": sha("artifacts/pip-audit-report.json"),
                  "semgrep": sha("artifacts/semgrep-report.json")
              },
              "trusted": True
          }

          pathlib.Path("trusted-build-manifest.json").write_text(json.dumps(manifest, indent=2))
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Upload trusted manifest
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build-manifest
          path: trusted-build-manifest.json
